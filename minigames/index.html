<script>
  // ── The shelf. Add a new game = add one entry here. ──────────────────────
  // Fields mirror the blog's post cards so the same .card styling applies:
  //   title, excerpt, cover (image URL), url (where "play" goes), tags[], meta
  const GAMES = [
    {
      title: "Cats — A Logic Puzzle",
      excerpt: "一格色一隻貓、一行一列一隻貓，貓貓之間唔可以掂到對方（連打斜都唔得）。A Star-Battle-style logic puzzle: one cat per colour, row and column — and no two cats may ever touch.",
      cover: "/images/catspuzzle-cover.svg",
      url: "/catspuzzle/",
      tags: ["邏輯", "puzzle"],
      meta: "▶ 開始玩 · play"
    }
  ];

  // ── Render (mirrors makeCard() in the blog's app.js) ─────────────────────
  function makeGameCard(game) {
    const a = document.createElement('a');
    a.className = 'card' + (game.cover ? '' : ' text-only');
    a.href = game.url;

    if (game.cover) {
      const img = document.createElement('img');
      img.className = 'card-cover';
      img.src = game.cover;
      img.alt = game.title;
      img.loading = 'lazy';
      a.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = game.title;
    body.appendChild(title);

    if (game.excerpt) {
      const ex = document.createElement('p');
      ex.className = 'card-excerpt';
      ex.textContent = game.excerpt;
      body.appendChild(ex);
    }

    if (game.meta) {
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.innerHTML = '<span>' + game.meta + '</span>';
      body.appendChild(meta);
    }

    if (game.tags && game.tags.length) {
      const tagsEl = document.createElement('div');
      tagsEl.className = 'card-tags';
      game.tags.forEach(function (t) {
        const span = document.createElement('span');
        span.className = 'card-tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
      body.appendChild(tagsEl);
    }

    a.appendChild(body);
    return a;
  }

  (function () {
    const grid = document.getElementById('gamesGrid');
    GAMES.forEach(function (g) { grid.appendChild(makeGameCard(g)); });
    document.getElementById('year').textContent = new Date().getFullYear();
  })();
</script>
</body>
