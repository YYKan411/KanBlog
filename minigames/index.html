<script>
  // ── The shelf. Add a new game = add one entry here. ──────────────────────
  // Fields mirror the blog's post cards so the same .card styling applies:
  //   title, excerpt, cover (image URL), alt, url (where "play" goes), tags[], meta
  const GAMES = [
    {
      title: "貓陣 · Cats — A Logic Puzzle",
      excerpt: "幫貓貓各自搵一格容身之所：每行、每列、每個色區只放一隻，仲要留返一點距離。Give every cat a quiet corner — one per row, column and colour, with room to breathe.",
      cover: "/images/catspuzzle-cover.webp",
      alt: "暖黃燈下，一張放好八隻木貓棋子嘅彩色邏輯盤",
      url: "/minigames/catspuzzle/",
      tags: ["邏輯", "logic"],
      meta: "▶ 開始玩 · play"
    },
    {
      title: "哲學傾向問卷 · Philosophical Tendency Quiz",
      excerpt: "答完三十六個深夜先會問嘅問題，睇下邊位思想家最似你一路以來嘅取捨。Thirty-six late-night questions; one thinker whose contradictions echo yours.",
      cover: "/images/philquiz-cover.webp",
      alt: "深夜酒吧枱面上嘅問卷卡、鋼筆、思想家肖像卡同一杯威士忌",
      url: "/minigames/philquiz/",
      tags: ["哲思", "philosophy"],
      meta: "▶ 開始玩 · play"
    },
    {
      title: "紙上象棋 · Xiangqi on Linen",
      excerpt: "行完一盤，陪你睇返邊一步改寫全局、點解，仲有本來可以點行。Play a quiet game, then see what changed everything.",
      cover: "/images/xiangqi-cover.webp",
      alt: "暖黃燈下嘅紙上象棋盤、茶杯、棋譜簿同一隻停喺盤邊嘅手",
      url: "/minigames/xiangqi/",
      tags: ["象棋", "xiangqi"],
      meta: "▶ 開始玩 · play"
    }
  ];

  // ── Render (mirrors makeCard() in the blog's app.js) ─────────────────────
  function makeGameCard(game) {
    const a = document.createElement('a');
    a.className = 'card' + (game.cover ? '' : ' text-only');
    a.href = game.url;

    if (game.cover) {
      const img = document.createElement('img');
      img.className = 'card-cover';
      img.src = game.cover;
      img.alt = game.alt || game.title;
      img.loading = 'lazy';
      a.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = game.title;
    body.appendChild(title);

    if (game.excerpt) {
      const ex = document.createElement('p');
      ex.className = 'card-excerpt';
      ex.textContent = game.excerpt;
      body.appendChild(ex);
    }

    if (game.meta) {
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.innerHTML = '<span>' + game.meta + '</span>';
      body.appendChild(meta);
    }

    if (game.tags && game.tags.length) {
      const tagsEl = document.createElement('div');
      tagsEl.className = 'card-tags';
      game.tags.forEach(function (t) {
        const span = document.createElement('span');
        span.className = 'card-tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
      body.appendChild(tagsEl);
    }

    a.appendChild(body);
    return a;
  }

  (function () {
    const grid = document.getElementById('gamesGrid');
    GAMES.forEach(function (g) { grid.appendChild(makeGameCard(g)); });
    document.getElementById('year').textContent = new Date().getFullYear();
  })();
</script>
