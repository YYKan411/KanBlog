<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>解碼室 Lab — SQL 練習</title>
  <link rel="stylesheet" href="./css/lab.css" />
</head>
<body data-page="lab">
  <div class="lab-shell">
    <header class="lab-top">
      <a class="lab-brand" href="./index.html">解碼室 <em>Lab</em></a>
      <div class="lab-meta">
        <span class="pill" id="learner-pill">—</span>
        <span class="pill" id="theme-pill">—</span>
        <span class="pill" id="progress-pill">0/0</span>
        <span class="pill" id="boot-status">啟動中…</span>
      </div>
    </header>

    <div class="lab-body">
      <aside class="side-nav">
        <div id="lesson-list" class="lesson-list"></div>
      </aside>

      <main class="work-pane">
        <section class="mission">
          <h1 id="mission-title">載入中</h1>
          <p id="mission-body"></p>
          <div class="hint-tags" id="mission-tags"></div>
        </section>

        <div class="schema-bar" id="schema-bar"></div>

        <div class="editor-wrap">
          <div class="editor-toolbar">
            <span>SQL · 真實 SQLite 執行</span>
            <div class="toolbar-actions">
              <button type="button" class="btn-sm btn-dim" id="btn-reset-sql">重設草稿</button>
              <button type="button" class="btn-sm btn-run" id="btn-run">執行／核對</button>
            </div>
          </div>
          <textarea id="sql-editor" spellcheck="false" aria-label="SQL 編輯器"></textarea>
        </div>

        <div class="results" id="results">
          <div class="results-empty">結果會顯示喺呢度。</div>
        </div>
      </main>

      <aside class="tutor-pane">
        <div class="tutor-head">
          <h2>蘇格拉底助教</h2>
          <p>只引導、指出漏洞、俾偽代碼——唔會直接貼完整答案。</p>
        </div>
        <div class="chat" id="chat"></div>
        <div class="tutor-actions">
          <button type="button" id="btn-hint">提示我（升一級）</button>
          <button type="button" id="btn-explain">解讀 EXPLAIN</button>
          <button type="button" id="btn-critique">算力評判官</button>
          <div style="display:grid;grid-template-columns:1fr auto;gap:0.4rem">
            <input id="ask-input" type="text" placeholder="問助教（唔好求完整答案）" style="border:1px solid var(--line);border-radius:10px;padding:0.55rem 0.7rem;font-size:0.85rem" />
            <button type="button" id="btn-ask" style="border-radius:10px;border:1px solid var(--line);background:var(--ink);color:#fff;padding:0.55rem 0.8rem;font-weight:700;cursor:pointer">問</button>
          </div>
          <div class="api-row">
            <details>
              <summary>進階：選用 OpenAI API（高階引導，仍然禁完整 SQL）</summary>
              <input id="api-key" type="password" placeholder="sk-… 只存你瀏覽器 localStorage" autocomplete="off" />
            </details>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
