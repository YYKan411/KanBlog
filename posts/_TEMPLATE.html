<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════
  HOW TO USE THIS TEMPLATE
  ════════════════════════════════════════════════════════════
  1. Copy this file's contents
  2. Create a new file in posts/ (e.g. my-new-post.html)
  3. Paste, then find-and-replace every [PLACEHOLDER] below
  4. Commit

  THAT'S IT.

  GitHub Actions will automatically scan posts/, regenerate
  app.js (the homepage post list) and sitemap.xml. Your new
  article appears on the homepage in ~2 minutes.
  ════════════════════════════════════════════════════════════
-->
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ============ BASIC SEO ============ -->
<title>[標題] — Kaga Chung</title>
<meta name="description" content="[文章前 150 字左右嘅描述，用嚟畀 Google + 社交媒體 preview 用]">
<meta name="author" content="Kaga Chung">
<meta name="keywords" content="[tag1], [tag2], [tag3]">

<!-- ============ HOMEPAGE CARD ============ -->
<!-- excerpt: 主頁卡片顯示嘅一兩句。建議唔好太長。 -->
<meta name="excerpt" content="[主頁卡片嘅一兩句]">
<!-- featured: uncomment 嚟做深色 featured 卡（主頁 stand out 用） -->
<!-- <meta name="featured" content="true"> -->

<!-- ============ OPEN GRAPH (Facebook / Threads / WhatsApp / LinkedIn) ============ -->
<meta property="og:type" content="article">
<meta property="og:title" content="[標題]">
<meta property="og:description" content="[同 description 一樣]">
<meta property="og:url" content="https://kanblog.pages.dev/posts/[檔名沒有.html].html">
<meta property="og:site_name" content="Kaga Chung">
<meta property="og:locale" content="zh_HK">
<meta property="article:published_time" content="[YYYY-MM-DD]">
<meta property="article:author" content="Kaga Chung">
<!-- 如果有 cover image (亦會自動做主頁卡片嘅 cover):
<meta property="og:image" content="https://kanblog.pages.dev/images/[圖片檔名]">
-->

<!-- ============ TWITTER CARD ============ -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="[標題]">
<meta name="twitter:description" content="[同 description 一樣]">
<!-- 如果有 cover image:
<meta name="twitter:image" content="https://kanblog.pages.dev/images/[圖片檔名]">
-->

<!-- ============ STRUCTURED DATA (Google Rich Result) ============ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "[標題]",
  "description": "[摘要]",
  "author": {
    "@type": "Person",
    "name": "Kaga Chung",
    "url": "https://kanblog.pages.dev/about.html"
  },
  "datePublished": "[YYYY-MM-DD]",
  "publisher": {
    "@type": "Person",
    "name": "Kaga Chung"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://kanblog.pages.dev/posts/[檔名沒有.html].html"
  }
}
</script>

<!-- ============ FONTS & STYLE ============ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+HK:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">

<style>
  /* (bilingual pair styling now lives in global style.css) */
</style>
</head>
<body>

<article class="article">
  <a href="../index.html" class="article-back">← back</a>

  <header class="article-header">
    <!-- 純中文標題：用呢個 -->
    <h1 class="article-title">[標題]</h1>

    <!-- 中英雙語標題：刪上面嗰行，用呢個（中文上、英文下、英文細啲、italic）
    <h1 class="article-title">[中文標題]<br><span style="font-size: 0.62em; font-style: italic; color: var(--ink-soft); font-weight: 400;">[英文標題]</span></h1>
    -->

    <div class="article-meta">[YYYY · MM · DD] &nbsp;·&nbsp; [主 tag，例如 散文]</div>
  </header>

  <!-- ════════ Cover image（封面圖）═══════
       想做封面圖嘅話，先上載圖去 /images/，再 uncomment 下面：
  <img src="../images/[檔名].jpg" alt="" class="article-cover">
  ═══════ -->

  <div class="article-body">

    <!-- ════════ 寫法選擇 ════════ -->

    <!-- 寫法 A：純中文段落，純粹用 <p>...</p> 包住就 OK -->
    <p>呢度寫第一段。</p>
    <p>呢度寫第二段。</p>

    <!-- 寫法 B：中英 pair（一段中、一段英、英文 italic）
    <div class="pair">
      <p class="zh">中文嗰段。</p>
      <p class="en">English here.</p>
    </div>
    -->

    <!-- 引用 blockquote
    <blockquote>引用嘅嘢。</blockquote>
    -->

    <!-- ════════ 圖嘅排版選項 ════════ -->

    <!-- 圖 1 — 大圖（佔成個欄闊）：最常用
    <img src="../images/[檔名].jpg" alt="[簡短描述，畀讀屏軟體用]">
    -->

    <!-- 圖 2 — 細圖（縮細置中，留白）
    <img src="../images/[檔名].jpg" alt="" class="img-inset">
    -->

    <!-- 圖 3 — 圖配 caption
    <figure>
      <img src="../images/[檔名].jpg" alt="">
      <figcaption>caption 寫呢度 — 例如：Reading, May 2026</figcaption>
    </figure>
    -->

    <!-- 圖 4 — 兩張圖左右並排（手機自動上下疊）
    <div class="img-row">
      <img src="../images/[檔名1].jpg" alt="">
      <img src="../images/[檔名2].jpg" alt="">
    </div>
    -->

  </div>

  <!-- ════════ tag 連結（撳咗會跳返主頁同時 filter 嗰個 tag） ════════ -->
  <div class="article-tags">
    <a href="../index.html#[tag1]">[tag1]</a>
    <a href="../index.html#[tag2]">[tag2]</a>
  </div>
</article>

<footer class="footer">
  <div class="footer-inner">
    <a href="../index.html">© Kaga Chung</a>
    <span class="dot">·</span>
    <a href="../about.html">about</a>
    <span class="dot">·</span>
    <a href="../feed.xml">rss</a>
  </div>
</footer>

<script src="../post.js"></script>

</body>
</html>
