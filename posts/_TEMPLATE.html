<body>

<article class="article">
  <a href="../" class="article-back">← back</a>

  <header class="article-header">
    <!-- 純中文標題：用呢個 -->
    <h1 class="article-title">[標題]</h1>

    <!-- 中英雙語標題：刪上面嗰行，用呢個（中文上、英文下、英文細啲、italic）
    <h1 class="article-title">[中文標題]<br><span style="font-size: 0.62em; font-style: italic; color: var(--ink-soft); font-weight: 400;">[英文標題]</span></h1>
    -->

    <div class="article-meta"><time datetime="[YYYY-MM-DD]">[YYYY · MM · DD]</time> &nbsp;·&nbsp; [主 tag，例如 散文]</div>
  </header>

  <!-- 如果有 cover image，加返呢行（檔名改你嘅）：
  <img src="../images/[檔名]" alt="[圖片描述 — SEO + accessibility，例如「蘭茲角，康和郡」]" class="article-cover">
  -->

  <div class="article-body">

    <!-- ════════ 寫法選擇 ════════ -->

    <!-- 寫法 A：純中文段落，純粹用 <p>...</p> 包住就 OK -->
    <p>呢度寫第一段。</p>
    <p>呢度寫第二段。</p>

    <!-- 寫法 B：中英 pair（一段中、一段英、英文 italic）
    <div class="pair">
      <p class="zh">中文嗰段。</p>
      <p class="en">English here.</p>
    </div>
    -->

    <!-- 引用 blockquote
    <blockquote>引用嘅嘢。</blockquote>
    -->

    <!-- 圖
    <img src="../images/[檔名]" alt="[圖片描述]">
    -->

  </div>

  <div class="article-tags">

</article>
