name: Auto-build post list & sitemap
on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'scripts/build.js'
      - 'about.html'
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # full history so build.js can read each page's git commit date
          # for deterministic sitemap <lastmod> (not fs mtime)
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run build script
        run: node scripts/build.js
      - name: Commit regenerated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit if there are actual changes
          if [[ -n "$(git status --porcelain)" ]]; then
            # Single source of truth: scripts/generated-files.js
            mapfile -t GENERATED < <(node -e "require('./scripts/generated-files.js').forEach(f => console.log(f))")
            git add -- "${GENERATED[@]}"
            git commit -m "chore: auto-update post list, sitemap & feed [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
