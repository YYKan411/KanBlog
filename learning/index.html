<style>
  /*
    Shelf cards: capped width so a single course does not stretch across
    the full --max-w and look hollow. auto-fit grows columns as courses
    are added; justify-content keeps a lone card left-aligned.
  */
  .learn-shelf {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 20rem), 24rem));
    gap: var(--col-gap);
    max-width: var(--max-w);
    margin: 0 auto 4rem;
    /* Match .masonry top padding so the card is not stuck to the masthead rule */
    padding: 48px 1.25rem 0;
    align-items: stretch;
    justify-content: start;
  }
  @media (max-width: 600px) {
    .learn-shelf { padding-top: 32px; }
  }
  .learn-shelf .card {
    display: flex;
    flex-direction: column;
    height: 100%;
    margin-bottom: 0;
    text-decoration: none;
    color: inherit;
  }
  .learn-shelf .card-body {
    display: flex;
    flex: 1;
    flex-direction: column;
    padding: 26px 26px 22px;
  }
  .learn-shelf .card-title {
    margin-bottom: 10px;
  }
  .learn-shelf .card-excerpt {
    margin-bottom: 0;
  }
  /* Meta + tags as one foot cluster; auto top-margin aligns CTAs when
     multiple cards have unequal excerpt lengths. */
  .learn-shelf .card-foot {
    margin-top: auto;
    padding-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .learn-shelf .card-tags {
    margin-top: 0;
  }
  .learn-shelf .card-meta {
    text-transform: none;
  }
</style>

<script>
  // Add a new course = add one entry here (same idea as minigames shelf).
  const COURSES = [
    {
      title: 'SQL 自學 · SQL from scratch',
      excerpt: 'SELECT 到 JOIN、Window、髒數據同 EXPLAIN。可揀英超、動漫或股票主題。From SELECT to JOINs, windows, dirty data and EXPLAIN — football, anime, or stocks.',
      url: '/learning/sql/',
      tags: ['SQL', 'data'],
      meta: '▶ 開始練習 · start'
    }
  ];

  function makeCourseCard(course) {
    const a = document.createElement('a');
    a.className = 'card text-only';
    a.href = course.url;

    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('h2');
    title.className = 'card-title';
    title.textContent = course.title;
    body.appendChild(title);

    if (course.excerpt) {
      const ex = document.createElement('p');
      ex.className = 'card-excerpt';
      ex.textContent = course.excerpt;
      body.appendChild(ex);
    }

    const foot = document.createElement('div');
    foot.className = 'card-foot';

    if (course.meta) {
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      meta.innerHTML = '<span>' + course.meta + '</span>';
      foot.appendChild(meta);
    }

    if (course.tags && course.tags.length) {
      const tagsEl = document.createElement('div');
      tagsEl.className = 'card-tags';
      course.tags.forEach(function (t) {
        const span = document.createElement('span');
        span.className = 'card-tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
      foot.appendChild(tagsEl);
    }

    if (foot.childNodes.length) body.appendChild(foot);

    a.appendChild(body);
    return a;
  }

  (function () {
    const grid = document.getElementById('learnGrid');
    COURSES.forEach(function (c) { grid.appendChild(makeCourseCard(c)); });
    document.getElementById('year').textContent = new Date().getFullYear();
  })();
</script>
